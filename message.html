<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>通訊頻道 - Traipeivel</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .chat-header { background: #1a73e8; color: white; padding: 15px; font-weight: bold; }
        .chat-content { flex: 1; padding: 15px; overflow-y: auto; }
        .msg { margin-bottom: 15px; max-width: 80%; padding: 10px; border-radius: 10px; }
        .msg-other { background: white; align-self: flex-start; }
        .msg-me { background: #dcf8c6; align-self: flex-end; margin-left: auto; }
        .input-area { background: white; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #ddd; padding-bottom: 80px;}
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; text-align: center; padding: 15px; text-decoration: none; color: #666; }
    </style>
</head>
<body>
    <div class="chat-header">💬 與 Alan 的對話</div>
    <div class="chat-content">
        <div class="msg msg-other">嘿！聽說你在 101 附近發現了隱藏據點？</div>
        <div class="msg msg-me">對啊，Gemini 建議我去那邊的，經驗值超多！</div>
    </div>
    <div class="input-area">
        <input type="text" placeholder="輸入訊息..." style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px;">
        <button style="border: none; background: none; font-size: 20px;">🚀</button>
    </div>

    <nav class="nav">
        <a href="index.html" class="nav-item">🏠 探索</a>
        <a href="search.html" class="nav-item">🔍 找人</a>
        <a href="message.html" class="nav-item" style="color: #1a73e8; font-weight: bold;">💬 訊息</a>
        <a href="personality.html" class="nav-item">👤 個人</a>
    </nav>
</body>
</html>
