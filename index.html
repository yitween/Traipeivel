<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Traipeivel - 城市探險</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; padding-bottom: 70px; }
        .top-bar { background: #1a73e8; color: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .logo { width: 40px; height: 40px; border-radius: 8px; background: white; padding: 2px; }
        .search-container { padding: 15px; background: white; }
        #map { height: 350px; width: 100%; }
        .card { background: white; padding: 15px; border-radius: 10px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .api-input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; margin-top: 5px; box-sizing: border-box; }
        /* 底部導覽 */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; text-align: center; padding: 15px; text-decoration: none; color: #666; font-size: 14px; }
        .nav-item.active { color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-bar">
    <img src="image-removebg-preview.png" alt="Logo" class="logo">
    <span style="font-weight: bold; font-size: 18px;">Traipeivel</span>
</div>

<div class="search-container">
    <input type="text" id="addressSearch" placeholder="🔍 查詢地址或地標..." style="width: 75%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
    <button onclick="searchAddress()" style="width: 20%; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 5px;">搜尋</button>
</div>

<div id="map"></div>

<div class="card">
    <strong>🤖 Gemini AI 顧問設定</strong>
    <input type="password" id="geminiKey" class="api-input" placeholder="在此輸入您的 Gemini API Key..." onchange="saveKey()">
    <p style="font-size: 11px; color: gray;">*金鑰僅儲存在您的瀏覽器中，用於即時旅程分析。</p>
</div>

<nav class="nav">
    <a href="index.html" class="nav-item active">🏠 探索</a>
    <a href="search.html" class="nav-item">🔍 找人</a>
    <a href="message.html" class="nav-item">💬 訊息</a>
    <a href="personality.html" class="nav-item">👤 個人</a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([25.047, 121.517], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function searchAddress() {
        const addr = document.getElementById('addressSearch').value;
        if(!addr) return;
        // 4/11 展示時說明：此處會串接 OpenFreeMap / Nominatim API 進行地理編碼
        alert("正在查詢地址: " + addr + " ... (模擬前往該地標)");
    }

    function saveKey() {
        const key = document.getElementById('geminiKey').value;
        localStorage.setItem('gemini_api_key', key);
        alert("API Key 已儲存，AI 顧問準備就緒！");
    }

    // 初始化讀取 Key
    window.onload = () => {
        document.getElementById('geminiKey').value = localStorage.getItem('gemini_api_key') || "";
    };
</script>
</body>
</html>
