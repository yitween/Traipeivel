<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找尋探險隊友 - Traipeivel</title>
    <style>
        :root { 
            --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853; 
            --text-main: #202124; --bg-light: #f8f9fa;
        }

        body { 
            background: white; margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            color: var(--text-main); padding-bottom: 80px; 
        }

        /* 1. 頂部搜尋列 (Sticky) */
        .search-header { 
            position: sticky; top: 0; background: white; 
            padding: 15px; border-bottom: 1px solid #ebebeb; z-index: 1000; 
        }
        .mini-logo { font-size: 22px; font-weight: bold; margin-bottom: 12px; }
        .blue { color: var(--g-blue); } .red { color: var(--g-red); } .yellow { color: var(--g-yellow); } .green { color: var(--g-green); }

        .search-input-wrapper { 
            background: white; border: 1px solid #dfe1e5; border-radius: 24px; 
            padding: 10px 16px; display: flex; align-items: center; 
            box-shadow: 0 2px 6px rgba(32,33,36,0.1); 
        }
        .search-input-wrapper input { border: none; outline: none; width: 100%; font-size: 16px; margin-left: 10px; }

        /* 2. 分類過濾標籤 */
        .filter-bar { 
            display: flex; overflow-x: auto; padding: 12px 15px; gap: 10px; 
            background: white; border-bottom: 1px solid #ebebeb;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-item { 
            font-size: 14px; color: #5f6368; cursor: pointer; padding: 6px 16px; 
            border: 1px solid #dfe1e5; border-radius: 20px; white-space: nowrap; transition: 0.2s;
        }
        .filter-item.active { 
            background: var(--g-blue); color: white; border-color: var(--g-blue); font-weight: 500; 
        }

        /* 3. 搜尋結果區域 */
        .results-container { padding: 15px; }
        .result-card { margin-bottom: 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* 景點樣式 (POI) */
        .poi-result { display: flex; gap: 12px; }
        .poi-img { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; }
        .poi-info { flex: 1; }
        .poi-title { color: #1a0dab; font-size: 17px; font-weight: 500; text-decoration: none; margin-bottom: 4px; display: block; }
        .poi-meta { color: #70757a; font-size: 13px; line-height: 1.4; }

        /* 用戶樣式 (User) */
        .user-result { 
            display: flex; align-items: center; gap: 12px; 
            padding: 12px; background: var(--bg-light); border-radius: 15px; 
        }
        .avatar-circle { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; }
        .user-details { flex: 1; }
        .user-details strong { display: block; font-size: 15px; }
        .user-details small { color: #70757a; font-size: 12px; }
        .follow-btn { background: var(--g-blue); color: white; border: none; padding: 6px 14px; border-radius: 18px; font-size: 13px; font-weight: 500; }

        /* 4. 通用底部導覽列 */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: white; 
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #EEE; z-index: 2000;
        }
        .nav-link { text-decoration: none; color: #999; font-size: 12px; text-align: center; }
        .nav-link.active { color: var(--g-blue); font-weight: bold; }
        .nav-link span { display: block; font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="search-header">
        <div class="mini-logo">
            <span class="blue">T</span><span class="red">r</span><span class="yellow">a</span><span class="blue">i</span><span class="green">p</span><span class="red">e</span>
        </div>
        <div class="search-input-wrapper">
            <span style="color:#9aa0a6;">🔍</span>
            <input type="text" placeholder="搜尋景點、用戶或貼文..." onkeyup="handleSearch()">
        </div>
    </div>

    <div class="filter-bar">
        <div class="filter-item active" onclick="changeFilter('all', this)">🔍 全部</div>
        <div class="filter-item" onclick="changeFilter('poi', this)">📸 景點</div>
        <div class="filter-item" onclick="changeFilter('user', this)">👤 探險家</div>
        <div class="filter-item" onclick="changeFilter('post', this)">📜 日誌</div>
    </div>

    <div class="results-container" id="resultsList">
        
        <div class="result-card poi-section">
            <div class="poi-result">
                <img src="https://images.unsplash.com/photo-1552055944-13b6ee7cc203?w=300" class="poi-img">
                <div class="poi-info">
                    <a href="#" class="poi-title">台北 101 觀景台</a>
                    <div class="poi-meta">⭐ 4.8 | 歷史地標<br>數位脈動強烈：建議攜帶 AI 掃描</div>
                </div>
            </div>
        </div>

        <div class="result-card user-section">
            <div class="user-result">
                <div class="avatar-circle" style="background: #E1306C;">S</div>
                <div class="user-details">
                    <strong>神風特攻隊_隊長</strong>
                    <small>Lv. 42 | 城市開拓者</small>
                </div>
                <button class="follow-btn">追蹤</button>
            </div>
        </div>

        <div class="result-card post-section" style="border: 1px solid #dadce0; border-radius: 12px; overflow: hidden;">
            <img src="https://images.unsplash.com/photo-1513019002896-357733650a98?w=500" style="width: 100%; display: block;">
            <div style="padding: 12px;">
                <small style="color:#70757a;">@Alan 分享了冒險日誌</small>
                <div style="font-size: 14px; margin-top: 5px;">西門町發現隱藏節點！經驗值翻倍中... #Traipeivel</div>
            </div>
        </div>

        <div class="result-card user-section">
            <div class="user-result">
                <div class="avatar-circle" style="background: #4caf50;">K</div>
                <div class="user-details">
                    <strong>Kamikaze_Rider</strong>
                    <small>Lv. 8 | 北投達人</small>
                </div>
                <button class="follow-btn">追蹤</button>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><span>🏠</span>探索</a>
        <a href="search.html" class="nav-link active"><span>🔍</span>搜尋</a>
        <a href="message.html" class="nav-link"><span>💬</span>訊息</a>
        <a href="personality.html" class="nav-link"><span>👤</span>個人</a>
    </nav>

    <script>
        function changeFilter(type, el) {
            document.querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');

            const sections = {
                'poi': document.querySelectorAll('.poi-section'),
                'user': document.querySelectorAll('.user-section'),
                'post': document.querySelectorAll('.post-section')
            };

            if (type === 'all') {
                Object.values(sections).forEach(group => group.forEach(s => s.style.display = 'block'));
            } else {
                Object.keys(sections).forEach(key => {
                    sections[key].forEach(s => s.style.display = (key === type ? 'block' : 'none'));
                });
            }
        }

        function handleSearch() {
            // 此處可介接搜尋 API
            console.log("正在檢索 Traipeivel 數據庫...");
        }
    </script>
</body>
</html>
