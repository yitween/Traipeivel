<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人探險日誌 - Traipeivel</title>
    <style>
        :root { 
            --rpg-gold: #FFD700; 
            --rpg-cyan: #00e5ff; 
            --primary-blue: #1a73e8;
            --glass-bg: rgba(0, 0, 0, 0.7);
        }

        body { 
            background: url('Gemini_Generated_Image_ucqy25ucqy25ucqy.png') no-repeat center center fixed; 
            background-size: cover; margin: 0; padding: 0; color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: -1; }

        /* 1. 登入區塊樣式 (置中彈窗感) */
        .auth-container { 
            background: white; border-radius: 20px; padding: 30px 20px; 
            margin: 100px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); color: #333;
        }
        .auth-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #666; font-weight: bold; }
        .tab.active { color: var(--primary-blue); border-bottom: 2px solid var(--primary-blue); }
        .auth-form { display: none; flex-direction: column; gap: 15px; }
        .auth-form.active { display: flex; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-submit { background: var(--primary-blue); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: bold; }

        /* 2. 角色資訊區 (整合版) */
        .profile-section { display: none; padding: 20px; padding-bottom: 100px; }
        
        .rpg-panel { 
            background: var(--glass-bg); backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; 
            padding: 20px; margin-top: 20px;
        }

        .avatar-box { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .gold-frame { 
            width: 75px; height: 75px; border: 3px solid var(--rpg-gold); 
            border-radius: 15px; overflow: hidden; box-shadow: 0 0 15px rgba(255,215,0,0.5); 
        }
        .gold-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .lvl-badge { background: var(--rpg-gold); color: black; padding: 2px 10px; border-radius: 5px; font-weight: bold; font-size: 13px; }

        /* 經驗條 */
        .exp-container { margin: 15px 0; font-size: 12px; color: #ccc; }
        .exp-bar { height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 5px; overflow: hidden; }
        .exp-fill { height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); width: 0%; transition: width 0.8s ease; }

        /* 3. 標籤頁切換 */
        .rpg-tabs { display: flex; margin-top: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; overflow: hidden; }
        .rpg-tab { flex: 1; text-align: center; padding: 12px; font-size: 14px; cursor: pointer; color: #aaa; }
        .rpg-tab.active { color: var(--rpg-gold); background: rgba(255,255,255,0.1); font-weight: bold; }

        /* 4. 內容區塊 */
        .tab-content { display: none; margin-top: 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stat-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .post-item { aspect-ratio: 1/1; background: #333; border-radius: 4px; overflow: hidden; position: relative; }
        .post-item img { width: 100%; height: 100%; object-fit: cover; }
        .post-label { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.6); font-size: 10px; padding: 2px 4px; border-radius: 3px; }

        /* 5. 底部導覽 */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 15px; text-decoration: none; color: #666; font-size: 14px; }
        .nav-item.active { color: var(--primary-blue); font-weight: bold; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="authBox" class="auth-container">
        <div class="auth-tabs">
            <div class="tab active" onclick="switchAuth('login', this)">探險家登入</div>
            <div class="tab" onclick="switchAuth('register', this)">建立契約</div>
        </div>

        <form id="loginForm" class="auth-form active" onsubmit="handleAuth(event, 'login')">
            <input type="email" placeholder="電子郵件" required>
            <input type="password" placeholder="輸入密碼" required>
            <button type="submit" class="btn-submit">啟動脈動導航</button>
        </form>

        <form id="registerForm" class="auth-form" onsubmit="handleAuth(event, 'register')">
            <input type="text" placeholder="探險家暱稱" required>
            <input type="email" placeholder="電子郵件" required>
            <input type="password" placeholder="設定密碼" required>
            <button type="submit" class="btn-submit">簽署冒險契約</button>
        </form>
    </div>

    <div id="profileContent" class="profile-section">
        <div class="rpg-panel">
            <div class="avatar-box">
                <div class="gold-frame"><img src="Gemini_Generated_Image_ucqy25ucqy25ucqy.png"></div>
                <div>
                    <div id="userNameDisplay" style="font-size: 22px; font-weight: bold; letter-spacing: 1px;">神風特攻隊</div>
                    <span class="lvl-badge">Lv. <span id="lvl">42</span></span>
                </div>
                <button onclick="logout()" style="margin-left: auto; background: none; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px;">登出</button>
            </div>

            <div class="exp-container">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span>開拓經驗值</span><span id="expText">2450 / 3000</span>
                </div>
                <div class="exp-bar"><div id="expFill" class="exp-fill"></div></div>
            </div>
        </div>

        <div class="rpg-tabs">
            <div class="rpg-tab active" onclick="switchTab('stats', this)">📊 屬性</div>
            <div class="rpg-tab" onclick="switchTab('posts', this)">📜 日誌</div>
            <div class="rpg-tab" onclick="switchTab('achieve', this)">🏆 成就</div>
        </div>

        <div id="stats" class="tab-content" style="display: block;">
            <div class="stat-card"><span>總探索距離</span><span style="color:var(--rpg-cyan);">128.5 km</span></div>
            <div class="stat-card"><span>達成任務數</span><span style="color:var(--rpg-cyan);">42 個</span></div>
            <div class="stat-card"><span>AI 好感度</span><span style="color:#ff80ab;">Lv. 8</span></div>
        </div>

        <div id="posts" class="tab-content">
            <div class="post-grid">
                <div class="post-item"><img src="https://images.unsplash.com/photo-1513019002896-357733650a98?w=300"><span class="post-label">📍西門</span></div>
                <div class="post-item"><img src="https://images.unsplash.com/photo-1552055944-13b6ee7cc203?w=300"><span class="post-label">📍101</span></div>
                <div class="post-item"><img src="https://images.unsplash.com/photo-1493225416302-61bb0ad343d9?w=300"><span class="post-label">📍北投</span></div>
            </div>
        </div>

        <div id="achieve" class="tab-content">
            <div class="stat-card"><span>🗺️ 城市之眼</span><span style="color:var(--rpg-gold);">已解鎖</span></div>
            <div class="stat-card"><span>⚡ 脈動追蹤者</span><span style="color:var(--rpg-gold);">進行中</span></div>
        </div>
    </div>

    <nav class="nav">
        <a href="index.html" class="nav-item">探索</a>
        <a href="search.html" class="nav-item">找人</a>
        <a href="message.html" class="nav-item">訊息</a>
        <a href="personality.html" class="nav-item active">個人</a>
    </nav>

    <script>
        // 1. 登入切換邏輯
        function switchAuth(type, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(type + 'Form').classList.add('active');
        }

        function handleAuth(event, type) {
            event.preventDefault();
            const name = type === 'register' ? event.target.elements[0].value : "神風特攻隊";
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', name);
            localStorage.setItem('userExp', "2450"); // 模擬初始經驗值
            checkStatus();
        }

        // 2. 狀態與 UI 更新
        function checkStatus() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            document.getElementById('authBox').style.display = isLoggedIn ? 'none' : 'block';
            document.getElementById('profileContent').style.display = isLoggedIn ? 'block' : 'none';

            if (isLoggedIn) {
                const name = localStorage.getItem('userName');
                document.getElementById('userNameDisplay').innerText = name;
                
                // 動態跑條動畫
                setTimeout(() => {
                    document.getElementById('expFill').style.width = "81.6%";
                }, 100);
            }
        }

        function logout() {
            localStorage.setItem('isLoggedIn', 'false');
            checkStatus();
        }

        // 3. 標籤切換
        function switchTab(tabId, el) {
            document.querySelectorAll('.rpg-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            el.classList.add('active');
            document.getElementById(tabId).style.display = 'block';
        }

        window.onload = checkStatus;
    </script>
</body>
</html>
