<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Traipeivel - 城市探險首頁</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; padding-bottom: 70px; }
        .header { background: #1a73e8; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #map { height: 400px; width: 100%; }
        .status-panel { padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .weather-info { color: #f57c00; font-weight: bold; }
        .btn-profile { background: white; color: #1a73e8; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-explore { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <span>Traipeivel 探索中</span>
        <button class="btn-profile" onclick="location.href='personality.html'">👤 個人主頁</button>
    </div>

    <div id="map"></div>

    <div class="status-panel">
        <div class="card">
            <div class="weather-info" id="weatherDisplay">🌤️ 天氣讀取中...</div>
            <p id="locationDisplay">📍 定位中...</p>
        </div>

        <div class="card" style="border-left: 5px solid #1a73e8;">
            <strong>Gemini AI 建議：</strong>
            <p id="aiContent">正在分析數位脈動，請稍候...</p>
        </div>

        <button class="btn-explore" onclick="handleExplore()">回報探索進度 (+20 EXP)</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地圖 (OpenFreeMap)
        const map = L.map('map').setView([25.047, 121.517], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([25.047, 121.517]).addTo(map).bindPopup("您的位置");

        // 時時定位功能
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                const newPos = [latitude, longitude];
                marker.setLatLng(newPos);
                map.panTo(newPos);
                document.getElementById('locationDisplay').innerText = `📍 目前位置: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
            });
        }

        // 模擬天氣系統
        const weathers = ["☀️ 晴朗 (適合騎 Ubike)", "🌧️ 大雨 (建議轉往地下街探索)", "☁️ 多雲 (適合徒步探險)"];
        document.getElementById('weatherDisplay').innerText = weathers[Math.floor(Math.random() * weathers.length)];

        function handleExplore() {
            let currentExp = parseInt(localStorage.getItem('userExp') || "0");
            currentExp += 20;
            localStorage.setItem('userExp', currentExp);
            document.getElementById('aiContent').innerText = "✨ 發現新據點！數據已同步至您的個人主頁。";
            alert("探索成功！獲得 20 EXP");
        }
    </script>
</body>
</html>
